<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1080" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="srcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="storeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="mlGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="scoreGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="outGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowDark" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="1080" fill="url(#bgGrad)" rx="0"/>

  <!-- ═══════════════════════════════════════ -->
  <!--                TITLE                    -->
  <!-- ═══════════════════════════════════════ -->
  <text x="480" y="38" fill="#0f172a" font-size="26" font-weight="700" text-anchor="middle" letter-spacing="-0.5">autofilm</text>
  <text x="480" y="60" fill="#64748b" font-size="13" text-anchor="middle" letter-spacing="3" font-weight="500">RECOMMENDATION ENGINE ARCHITECTURE</text>

  <!-- ═══════════════════════════════════════ -->
  <!--           EXTERNAL SOURCES              -->
  <!-- ═══════════════════════════════════════ -->
  <text x="40" y="100" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="2">EXTERNAL SOURCES</text>
  <line x1="40" y1="108" x2="920" y2="108" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Letterboxd -->
  <rect x="40" y="125" width="200" height="62" rx="10" fill="url(#srcGrad)" filter="url(#shadow)"/>
  <text x="140" y="153" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Letterboxd</text>
  <text x="140" y="173" fill="#bfdbfe" font-size="11" text-anchor="middle">RSS feed / CSV export</text>

  <!-- MovieLens -->
  <rect x="270" y="125" width="200" height="62" rx="10" fill="url(#srcGrad)" filter="url(#shadow)"/>
  <text x="370" y="153" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">MovieLens</text>
  <text x="370" y="173" fill="#bfdbfe" font-size="11" text-anchor="middle">ml-latest catalog (62k films)</text>

  <!-- TMDB API -->
  <rect x="500" y="125" width="200" height="62" rx="10" fill="url(#srcGrad)" filter="url(#shadow)"/>
  <text x="600" y="153" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">TMDB API</text>
  <text x="600" y="173" fill="#bfdbfe" font-size="11" text-anchor="middle">metadata + keywords + credits</text>

  <!-- Film Critics -->
  <rect x="730" y="125" width="192" height="62" rx="10" fill="url(#srcGrad)" filter="url(#shadow)"/>
  <text x="826" y="153" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Film Critics</text>
  <text x="826" y="173" fill="#bfdbfe" font-size="11" text-anchor="middle">Sight &amp; Sound / TSPDT</text>

  <!-- ═══════════════════════════════════════ -->
  <!--            COMMAND LABELS               -->
  <!-- ═══════════════════════════════════════ -->
  <!-- Arrows from sources to storage -->
  <line x1="140" y1="187" x2="140" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="102" y="210" width="76" height="20" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="140" y="224" fill="#1d4ed8" font-size="10" font-weight="600" text-anchor="middle">ingest</text>

  <line x1="370" y1="187" x2="370" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="187" x2="485" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="410" y="210" width="76" height="20" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="448" y="224" fill="#1d4ed8" font-size="10" font-weight="600" text-anchor="middle">setup</text>

  <line x1="826" y1="187" x2="826" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="771" y="210" width="110" height="20" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="826" y="224" fill="#1d4ed8" font-size="10" font-weight="600" text-anchor="middle">build_prestige</text>

  <!-- ═══════════════════════════════════════ -->
  <!--            LOCAL DATA STORAGE           -->
  <!-- ═══════════════════════════════════════ -->
  <text x="40" y="260" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="2">LOCAL DATA</text>
  <line x1="40" y1="268" x2="920" y2="268" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ratings.json -->
  <rect x="40" y="283" width="200" height="62" rx="10" fill="url(#storeGrad)" filter="url(#shadow)"/>
  <text x="140" y="311" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">ratings.json</text>
  <text x="140" y="331" fill="#cbd5e1" font-size="11" text-anchor="middle">104 films, rated 1-10</text>

  <!-- tmdb_cache.db -->
  <rect x="270" y="283" width="330" height="62" rx="10" fill="url(#storeGrad)" filter="url(#shadow)"/>
  <text x="435" y="311" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">tmdb_cache.db</text>
  <text x="435" y="331" fill="#cbd5e1" font-size="11" text-anchor="middle">85,224 films  ~  genres, directors, plots, keywords</text>

  <!-- prestige_index.json -->
  <rect x="630" y="283" width="292" height="62" rx="10" fill="url(#storeGrad)" filter="url(#shadow)"/>
  <text x="776" y="311" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">prestige_index.json</text>
  <text x="776" y="331" fill="#cbd5e1" font-size="11" text-anchor="middle">937 critically acclaimed films (1.0-2.0x)</text>

  <!-- ═══════════════════════════════════════ -->
  <!--          ML / EMBEDDING PIPELINE        -->
  <!-- ═══════════════════════════════════════ -->
  <text x="40" y="405" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="2">EMBEDDING PIPELINE</text>
  <line x1="40" y1="413" x2="920" y2="413" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Arrow from tmdb_cache.db down to transformer -->
  <line x1="435" y1="345" x2="435" y2="428" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="397" y="367" width="76" height="20" rx="10" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="435" y="381" fill="#6d28d9" font-size="10" font-weight="600" text-anchor="middle">train</text>

  <!-- Sentence Transformer -->
  <rect x="155" y="430" width="560" height="62" rx="10" fill="url(#mlGrad)" filter="url(#shadow)"/>
  <text x="435" y="455" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Sentence Transformer</text>
  <text x="435" y="475" fill="#ddd6fe" font-size="11.5" text-anchor="middle">paraphrase-multilingual-MiniLM-L12-v2  (384-dim, 50+ languages)</text>

  <!-- text construction annotation -->
  <rect x="745" y="430" width="180" height="62" rx="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="835" y="455" fill="#6d28d9" font-size="11" font-weight="600" text-anchor="middle">text per film:</text>
  <text x="835" y="472" fill="#7c3aed" font-size="10" text-anchor="middle">title + genres + director</text>
  <text x="835" y="485" fill="#7c3aed" font-size="10" text-anchor="middle">+ plot + keywords + year</text>

  <!-- Arrow down to embeddings -->
  <line x1="435" y1="492" x2="435" y2="520" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Embeddings file -->
  <rect x="255" y="525" width="360" height="50" rx="10" fill="url(#mlGrad)" opacity="0.85" filter="url(#shadow)"/>
  <text x="435" y="548" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">embeddings.npz</text>
  <text x="435" y="564" fill="#ddd6fe" font-size="11" text-anchor="middle">85,224 films x 384 dimensions (unit vectors)</text>

  <!-- ═══════════════════════════════════════ -->
  <!--         RECOMMENDATION ENGINE           -->
  <!-- ═══════════════════════════════════════ -->
  <text x="40" y="625" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="2">RECOMMENDATION ENGINE</text>
  <line x1="40" y1="633" x2="920" y2="633" stroke="#e2e8f0" stroke-width="1"/>

  <!-- command label -->
  <rect x="193" y="611" width="48" height="20" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="217" y="625" fill="#92400e" font-size="10" font-weight="600" text-anchor="middle">run</text>

  <!-- Converging arrows into taste profile -->
  <!-- from ratings.json -->
  <path d="M 140 345 L 140 390 Q 140 400 150 400 L 260 650" stroke="#94a3b8" stroke-width="1.2" fill="none" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <!-- from embeddings -->
  <line x1="435" y1="575" x2="435" y2="650" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- from prestige_index -->
  <path d="M 776 345 L 776 390 Q 776 400 766 400 L 660 742" stroke="#94a3b8" stroke-width="1.2" fill="none" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- Taste Profile box -->
  <rect x="155" y="655" width="560" height="70" rx="10" fill="url(#scoreGrad)" filter="url(#shadow)"/>
  <text x="435" y="683" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Taste Profile</text>
  <text x="435" y="703" fill="#fef3c7" font-size="12" text-anchor="middle" font-style="italic">profile = mean(loved embeddings) - 0.8 x mean(disliked embeddings)</text>

  <!-- annotation: bands -->
  <rect x="745" y="655" width="180" height="70" rx="10" fill="#fffbeb" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="835" y="676" fill="#92400e" font-size="11" font-weight="600" text-anchor="middle">rating bands:</text>
  <text x="835" y="693" fill="#b45309" font-size="10" text-anchor="middle">9-10 = loved (positive)</text>
  <text x="835" y="706" fill="#b45309" font-size="10" text-anchor="middle">6-8 = ignored (neutral)</text>
  <text x="835" y="719" fill="#b45309" font-size="10" text-anchor="middle">1-5 = disliked (negative)</text>

  <!-- Arrow to scoring -->
  <line x1="435" y1="725" x2="435" y2="750" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Scoring Formula box -->
  <rect x="80" y="755" width="710" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
  <text x="435" y="783" fill="#0f172a" font-size="15" font-weight="700" text-anchor="middle">Scoring Formula</text>

  <!-- Formula with colored segments -->
  <text x="435" y="810" fill="#334155" font-size="12.5" text-anchor="middle" font-weight="600">
    score = sim<tspan baseline-shift="super" font-size="9">2</tspan>
    <tspan fill="#64748b"> x </tspan>
    <tspan fill="#0369a1">quality</tspan>
    <tspan fill="#64748b"> x </tspan>
    <tspan fill="#7c3aed">obscurity</tspan>
    <tspan fill="#64748b"> x </tspan>
    <tspan fill="#0d9488">locale</tspan>
    <tspan fill="#64748b"> x </tspan>
    <tspan fill="#c2410c">director</tspan>
    <tspan fill="#64748b"> x </tspan>
    <tspan fill="#4338ca">prestige</tspan>
    <tspan fill="#64748b"> x </tspan>
    <tspan fill="#9333ea">nn</tspan>
  </text>

  <!-- Legend for each multiplier -->
  <text x="110" y="840" fill="#0369a1" font-size="9.5" font-weight="600">quality</text>
  <text x="110" y="853" fill="#64748b" font-size="9">(TMDB score)^1.5</text>

  <text x="230" y="840" fill="#7c3aed" font-size="9.5" font-weight="600">obscurity</text>
  <text x="230" y="853" fill="#64748b" font-size="9">hidden gem boost</text>

  <text x="355" y="840" fill="#0d9488" font-size="9.5" font-weight="600">locale</text>
  <text x="355" y="853" fill="#64748b" font-size="9">lang/country pref</text>

  <text x="470" y="840" fill="#c2410c" font-size="9.5" font-weight="600">director</text>
  <text x="470" y="853" fill="#64748b" font-size="9">loved filmmaker boost</text>

  <text x="600" y="840" fill="#4338ca" font-size="9.5" font-weight="600">prestige</text>
  <text x="600" y="853" fill="#64748b" font-size="9">S&amp;S / TSPDT rank</text>

  <text x="715" y="840" fill="#9333ea" font-size="9.5" font-weight="600">nn_blend</text>
  <text x="715" y="853" fill="#64748b" font-size="9">structured features</text>

  <!-- Filters annotation -->
  <rect x="810" y="760" width="130" height="105" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="875" y="781" fill="#991b1b" font-size="10" font-weight="600" text-anchor="middle">filters:</text>
  <text x="875" y="797" fill="#b91c1c" font-size="9" text-anchor="middle">votes &lt; 300</text>
  <text x="875" y="811" fill="#b91c1c" font-size="9" text-anchor="middle">TMDB &lt; 7.0</text>
  <text x="875" y="825" fill="#b91c1c" font-size="9" text-anchor="middle">sim &lt; 0.25</text>
  <text x="875" y="839" fill="#b91c1c" font-size="9" text-anchor="middle">shorts / TV movies</text>
  <text x="875" y="853" fill="#b91c1c" font-size="9" text-anchor="middle">romance-dominated</text>

  <!-- Arrow to diversity -->
  <line x1="435" y1="870" x2="435" y2="895" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Genre Diversity Filter -->
  <rect x="235" y="900" width="400" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="435" y="918" fill="#475569" font-size="12" font-weight="600" text-anchor="middle">Genre Diversity Cap</text>
  <text x="435" y="933" fill="#94a3b8" font-size="10" text-anchor="middle">max 40% from any single genre</text>

  <!-- Arrow to output -->
  <line x1="435" y1="942" x2="435" y2="970" stroke="#64748b" stroke-width="2" marker-end="url(#arrowDark)"/>

  <!-- ═══════════════════════════════════════ -->
  <!--              OUTPUT                     -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="205" y="975" width="460" height="60" rx="12" fill="url(#outGrad)" filter="url(#shadow)"/>
  <text x="435" y="1003" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">Top N Recommendations</text>
  <text x="435" y="1023" fill="#a7f3d0" font-size="12" text-anchor="middle">title, year, genres, director, match score</text>

  <!-- ═══════════════════════════════════════ -->
  <!--           FOOTER / CREDITS              -->
  <!-- ═══════════════════════════════════════ -->
  <text x="480" y="1065" fill="#cbd5e1" font-size="10" text-anchor="middle">autofilm - content-based recommendation with semantic embeddings, critical prestige, and director affinity</text>

</svg>
